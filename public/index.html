/* ═══ BARCODE ANALYZER ═══ */
const FORMAT_MAP={all:null,ean_13:"ean_13",ean_8:"ean_8",upc_a:"upc_a",upc_e:"upc_e",data_matrix:"data_matrix",qr_code:"qr_code",code_128:"code_128",code_39:"code_39"};
const ALL_FORMATS=["ean_13","ean_8","upc_a","upc_e","code_128","code_39","code_93","itf","codabar","qr_code","pdf417","aztec","data_matrix"];

class BarcodeAnalyzer{
  constructor(){this.detector=null;this.isEnabled=true;this.scanThrottleMs=300;this.duplicateCooldownMs=2500;this.lastScanTime=0;this.recentScans=new Map();this.onResult=null;this._polyfillLoaded=false;this.selectedFormat="all";this.lastCandidate=null;this.confirmCount=0;this.requiredConfirmations=3;this.minWidthPercent=0.25;this.scanAreaPercent=0.6}
  async init(format){
    this.selectedFormat=format||"all";
    const fmts=this.selectedFormat!=="all"?[FORMAT_MAP[this.selectedFormat]].filter(Boolean):ALL_FORMATS;
    if("BarcodeDetector" in window){try{const supported=await BarcodeDetector.getSupportedFormats();const valid=fmts.filter(f=>supported.includes(f));if(valid.length>0){this.detector=new BarcodeDetector({formats:valid});return true}}catch(e){}}
    if(!this._polyfillLoaded){try{const mod=await import("https://cdn.jsdelivr.net/npm/barcode-detector@2/+esm");const Poly=mod.BarcodeDetector||mod.default;if(Poly){this.detector=this.selectedFormat!=="all"?new Poly({formats:fmts}):new Poly();this._polyfillLoaded=true;return true}}catch(e){}}
    return!!this.detector;
  }
  setEnabled(v){this.isEnabled=v;if(!v)this.recentScans.clear()}
  async detect(videoEl){
    if(!this.isEnabled||!this.detector)return;
    const now=Date.now();if(now-this.lastScanTime<this.scanThrottleMs)return;
    try{
      const barcodes=await this.detector.detect(videoEl);if(!barcodes?.length)return;
      let best=null;
      if(this.selectedFormat!=="all"){const wanted=FORMAT_MAP[this.selectedFormat];best=barcodes.find(b=>b.format===wanted)}
      else{best=barcodes.find(b=>!["data_matrix","qr_code","pdf417","aztec"].includes(b.format))||barcodes[0]}
      if(!best?.rawValue||!best.boundingBox)return;
      const value=best.rawValue.trim();const box=best.boundingBox;
      const vw=videoEl.videoWidth,vh=videoEl.videoHeight;if(!vw||!vh)return;
      if(box.width<vw*this.minWidthPercent)return;
      const cx=vw/2,cy=vh/2,sw=vw*this.scanAreaPercent,sh=vh*this.scanAreaPercent;
      if(box.x<cx-sw/2||box.x+box.width>cx+sw/2||box.y<cy-sh/2||box.y+box.height>cy+sh/2)return;
      if(best.format==="ean_13"){if(!/^\d{13}$/.test(value))return;const d=value.split("").map(Number);const c=d.pop();const s=d.reduce((a,n,i)=>a+n*(i%2===0?1:3),0);if((10-(s%10))%10!==c)return}
      if(this.lastCandidate===value){this.confirmCount++}else{this.lastCandidate=value;this.confirmCount=1}
      if(this.confirmCount<this.requiredConfirmations)return;
      this.confirmCount=0;this.lastCandidate=null;
      const last=this.recentScans.get(value);if(last&&now-last<this.duplicateCooldownMs)return;
      this.lastScanTime=now;this.recentScans.set(value,now);
      const expire=now-300000;for(const[k,v]of this.recentScans){if(v<expire)this.recentScans.delete(k)}
      if(this.onResult)this.onResult({rawValue:value,format:best.format,timestamp:now});
    }catch(e){}
  }
  destroy(){this.detector=null;this.recentScans.clear()}
}

/* ═══ SOUND MANAGER ═══ */
const SoundMgr={
  _ctx:null,
  _getCtx(){if(!this._ctx)this._ctx=new(window.AudioContext||window.webkitAudioContext)();return this._ctx},
  _beep(freq,dur,type="sine"){try{const ctx=this._getCtx();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type=type;osc.frequency.value=freq;gain.gain.value=0.15;gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);osc.connect(gain);gain.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+dur)}catch(e){}},
  success(){this._beep(1200,0.12)},
  warning(){this._beep(600,0.08);setTimeout(()=>this._beep(600,0.08),100)},
  error(){this._beep(300,0.15,"square");setTimeout(()=>this._beep(200,0.2,"square"),180)}
};

/* ═══ SCANNER ═══ */
function Scanner({onScan,onClose,format}){
  const videoRef=useRef(null);const analyzerRef=useRef(null);
  const[last,setLast]=useState(null);const[count,setCount]=useState(0);
  const[err,setErr]=useState(null);const[loading,setLoading]=useState(true);
  const[engineType,setEngineType]=useState("");
  const deadRef=useRef(false);const streamRef=useRef(null);
  const lastCodeRef=useRef("");const lastTimeRef=useRef(0);

  useEffect(()=>{
    deadRef.current=false;let rafId=0;
    (async()=>{
      try{
        const analyzer=new BarcodeAnalyzer();analyzerRef.current=analyzer;
        analyzer.scanThrottleMs=200;analyzer.duplicateCooldownMs=2500;
        const ok=await analyzer.init(format);
        if(deadRef.current)return;
        if(!ok){setErr("Не удалось инициализировать сканер");setLoading(false);return}
        setEngineType(("BarcodeDetector"in window)?"Native ML Kit":"ZXing WASM");
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
        if(deadRef.current){stream.getTracks().forEach(t=>t.stop());return}
        streamRef.current=stream;const v=videoRef.current;v.srcObject=stream;await v.play();
        if(deadRef.current)return;setLoading(false);
        analyzer.onResult=(result)=>{
          if(deadRef.current)return;const code=result.rawValue;const now=Date.now();
          if(code===lastCodeRef.current&&now-lastTimeRef.current<2500)return;
          if(now-lastTimeRef.current<600)return;
          lastCodeRef.current=code;lastTimeRef.current=now;
          setLast(code);setCount(c=>c+1);onScan(code,result.format);
          try{navigator.vibrate(80)}catch(e){}
        };
        const tick=async()=>{if(deadRef.current)return;if(v.readyState>=2)await analyzer.detect(v);rafId=requestAnimationFrame(tick)};
        rafId=requestAnimationFrame(tick);
      }catch(e){
        if(!deadRef.current){
          const msg=e.name==="NotAllowedError"?"Доступ к камере запрещён":e.name==="NotFoundError"?"Камера не найдена":"Камера: "+e.message;
          setErr(msg);setLoading(false);
        }
      }
    })();
    return()=>{deadRef.current=true;cancelAnimationFrame(rafId);if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());if(analyzerRef.current)analyzerRef.current.destroy()};
  },[format,onScan]);

  return html`
    <div style=${{position:"fixed",inset:0,zIndex:2000,background:"#000",display:"flex",flexDirection:"column"}}>
      <div style=${{flex:1,position:"relative",overflow:"hidden"}}>
        <video ref=${videoRef} style=${{width:"100%",height:"100%",objectFit:"cover"}} playsinline muted/>
        ${loading&&html`<div style=${{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.85)",zIndex:5}}>
          <div style=${{textAlign:"center"}}><div style=${{width:44,height:44,border:"3px solid #333",borderTopColor:"#00c96a",borderRadius:"50%",margin:"0 auto 14px",animation:"spin .7s linear infinite"}}/><div style=${{color:"#ddd",fontSize:15}}>Загрузка сканера...</div><div style=${{color:"#666",fontSize:12,marginTop:4}}>Разрешите доступ к камере</div></div>
        </div>`}
        ${!loading&&!err&&html`
          <div style=${{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none",zIndex:3}}>
            <div style=${{width:"72%",maxWidth:300,aspectRatio:"1",borderRadius:14,boxShadow:"0 0 0 4000px rgba(0,0,0,.4)"}}>
              <div style=${{width:"100%",height:"100%",border:"2px solid rgba(0,255,136,.5)",borderRadius:14,position:"relative",overflow:"hidden"}}>
                <div style=${{position:"absolute",top:"50%",left:8,right:8,height:2,background:"rgba(0,255,136,.4)",animation:"scanmv 2s ease-in-out infinite"}}/>
              </div>
            </div>
          </div>
          <div style=${{position:"absolute",top:12,left:12,background:"rgba(0,0,0,.55)",borderRadius:6,padding:"4px 10px",zIndex:4}}>
            <span style=${{fontSize:10,color:"#0f8",fontFamily:"monospace"}}>${engineType}</span>
          </div>
        `}
      </div>
      ${last&&html`<div style=${{background:"linear-gradient(135deg,#0d7a42,#0a6838)",color:"#fff",padding:"10px 16px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style=${{width:28,height:28,borderRadius:"50%",background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>${count}</div>
        <div style=${{flex:1,fontFamily:"monospace",fontSize:14,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${last}</div>
      </div>`}
      ${err&&html`<div style=${{background:"#c62828",color:"#fff",padding:16,textAlign:"center",fontSize:14,flexShrink:0,lineHeight:1.4}}>${err}</div>`}
      <button onClick=${onClose} class="B" style=${{background:"#151530",color:"#eee",borderRadius:0,padding:18,fontSize:16,borderTop:"1px solid #222"}}>✕ Закрыть сканер</button>
    </div>
  `;
}

function InputSheet({title,placeholder,onSubmit,onClose}){
  const[v,setV]=useState("");
  const ref=useRef(null);
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),150)},[]);
  const go=()=>{if(v.trim()){onSubmit(v.trim());setV("")}};
  return html`<${Sheet} onClose=${onClose}>
    <h3 style=${{margin:"0 0 16px",color:"#fff",fontSize:18}}>${title}</h3>
    <input ref=${ref} value=${v} onInput=${e=>setV(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter")go()}} placeholder=${placeholder}/>
    <div style=${{display:"flex",gap:8,marginTop:16}}>
      <button class="B BG" style=${{flex:1}} onClick=${go}>Создать</button>
      <button class="B BO" style=${{flex:1}} onClick=${onClose}>Отмена</button>
    </div>
  <//>`;
}

/* ═══ RENAME SHEET ═══ */
function RenameSheet({title,currentName,onSubmit,onClose}){
  const[v,setV]=useState(currentName||"");
  const ref=useRef(null);
  useEffect(()=>{setTimeout(()=>{ref.current?.focus();ref.current?.select()},150)},[]);
  const go=()=>{if(v.trim()&&v.trim()!==currentName){onSubmit(v.trim())}onClose()};

      <button class="B BG" style=${{flex:1}} onClick=${go}><${I} d=${ic.check} s=${16}/> Сохранить</button>
      <button class="B BO" style=${{flex:1}} onClick=${onClose}>Отмена</button>
    </div>
  <//>`;

/* ═══ MANUAL INPUT (universal: barcode or article) ═══ */
function ManualInput({onScan,onClose}){
  const[mode,setMode]=useState("barcode"); // barcode | article
  const[v,setV]=useState("");
  const[warn,setWarn]=useState("");
  const ref=useRef(null);
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),150)},[]);
  useEffect(()=>{setV("");setWarn("");setTimeout(()=>ref.current?.focus(),50)},[mode]);

  const go=async()=>{
    if(!v.trim())return;
    setWarn("");
    if(mode==="barcode"){
      onScan(v.trim(),"manual");
      setV("");
      ref.current?.focus();
    }else{
      // Article mode: lookup article -> get barcode
      try{
        const r=await API.get("/articles/lookup?article="+encodeURIComponent(v.trim()));
        if(r.found){
          onScan(r.barcode,"manual",r.article);
          showToast(r.article+" → "+r.barcode,"ok");
          setV("");
          ref.current?.focus();
        }else{
          // Article not found in table — add as article-only (no barcode)
          setWarn("Артикул не найден в таблице. Добавить без баркода?");
        }
      }catch(e){setWarn("Ошибка поиска: "+e.message)}
    }
  };

  const addWithoutBarcode=()=>{
    // Add article without barcode — pass empty barcode, article as manual
    onScan("","manual",v.trim());
    showToast("Добавлен артикул: "+v.trim(),"ok");
    setV("");setWarn("");
    ref.current?.focus();
  };

  return html`
    <div style=${{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>

/* ═══ SEARCH SHEET ═══ */
function SearchSheet({onClose}){
  const[q,setQ]=useState("");
  const[results,setResults]=useState([]);
  const[loading,setLoading]=useState(false);
  const ref=useRef(null);
  const timer=useRef(null);
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),150)},[]);

  const doSearch=useCallback((query)=>{
    if(!query.trim()){setResults([]);return}
    setLoading(true);
    clearTimeout(timer.current);
    timer.current=setTimeout(async()=>{
      try{const r=await API.get("/articles/search?q="+encodeURIComponent(query.trim()));setResults(r)}catch{}
      setLoading(false);
    },300);
  },[]);

  const onInput=e=>{const val=e.target.value;setQ(val);doSearch(val)};

  return html`<${Sheet} onClose=${onClose}>
    <h3 style=${{margin:"0 0 14px",color:"#fff",fontSize:18}}><${I} d=${ic.search} s=${18}/> Поиск по артикулу</h3>
    <input ref=${ref} value=${q} onInput=${onInput} placeholder="Артикул или баркод..."/>
    <div style=${{marginTop:14,maxHeight:300,overflowY:"auto"}}>
      ${loading&&html`<div style=${{textAlign:"center",padding:16,color:"#666"}}>Поиск...</div>`}
      ${!loading&&q&&results.length===0&&html`<div style=${{textAlign:"center",padding:16,color:"#555"}}>Ничего не найдено</div>`}
      ${results.map(a=>html`
        <div key=${a.id} class="card" style=${{padding:"11px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style=${{fontWeight:700,color:"#ddd",fontSize:14}}>${a.article}</div><div style=${{fontFamily:"monospace",fontSize:11,color:"#555",marginTop:2}}>${a.barcode}</div></div>

  <//>`;
}

/* ═══ CELL IMPORT SHEET ═══ */
function CellImportSheet({whId,onClose,onDone}){
  const fRef=useRef(null);
  const[preview,setPreview]=useState([]);
  const[busy,setBusy]=useState(false);

  const onFile=async e=>{
    const f=e.target.files?.[0];if(!f)return;
    const t=await f.text();
    const lines=t.split(/\r?\n/).map(l=>l.replace(/[;,\t]/g,"").trim()).filter(Boolean);
    // Skip header if first line looks like header
    const start=(lines[0]&&/^(название|ячейка|name|cell)/i.test(lines[0]))?1:0;
    setPreview(lines.slice(start));
    e.target.value="";
  };

  const doImport=async()=>{
    if(!preview.length)return;
    setBusy(true);
    try{
      const r=await API.post("/warehouses/"+whId+"/cells/import",{names:preview});
      showToast("Импортировано: "+r.count+" ячеек","ok");
      onDone();onClose();
    }catch(e){showToast(e.message,"err")}
    setBusy(false);
  };

  return html`<${Sheet} onClose=${onClose}>
    <h3 style=${{margin:"0 0 14px",color:"#fff",fontSize:18}}><${I} d=${ic.ul} s=${18}/> Импорт ячеек</h3>
    <p style=${{color:"#666",fontSize:13,margin:"0 0 12px"}}>CSV/TXT файл — по одной ячейке на строку</p>
    <input ref=${fRef} type="file" accept=".csv,.txt,.tsv" style=${{display:"none"}} onChange=${onFile}/>
    <button class="B BD" style=${{width:"100%",marginBottom:12}} onClick=${()=>fRef.current?.click()}><${I} d=${ic.ul} s=${16}/> Выбрать файл</button>
    ${preview.length>0&&html`
      <div style=${{background:"#0d0d1a",border:"1px solid #252540",borderRadius:10,padding:12,maxHeight:200,overflowY:"auto",marginBottom:12}}>
        <div style=${{fontSize:12,color:"#666",marginBottom:6}}>Будет создано: ${preview.length} ячеек</div>
        ${preview.map((n,i)=>html`<div key=${i} style=${{padding:"4px 0",fontSize:13,color:"#bbb",borderBottom:"1px solid #1a1a30"}}>${n}</div>`)}
      </div>
      <button class="B BG" style=${{width:"100%"}} onClick=${doImport} disabled=${busy}>${busy?"Импорт...":"Импортировать"}</button>
    `}
  <//>`;
}

/* ═══ Export helpers ═══ */
async function doExpCSV(){

}
async function doExpXLSX(){
  const rows=await API.get("/export");

  const ws=X.utils.aoa_to_sheet([["Артикул","Баркод","Склад","Ячейка","Время"],...rows.map(r=>[r.article,r.barcode,r.warehouse,r.cell,r.scanned_at])]);

        `}

        ${isS&&html`
          <div class="card fade-in" style=${{padding:16,marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
            <div style=${{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#00c96a15,#00a5ff15)",display:"flex",alignItems:"center",justifyContent:"center"}}><${I} d=${ic.user} s=${20} c="#00c96a"/></div>
            <div><div style=${{fontWeight:700,color:"#fff",fontSize:16}}>${username}</div><div style=${{fontSize:12,color:"#555"}}>Серверная авторизация</div></div>
          </div>
          <label style=${{fontSize:13,color:"#777",display:"block",marginBottom:6}}>Формат баркода</label>
          <select value=${fmt} onChange=${e=>savF(e.target.value)} style=${{marginBottom:18}}>
            ${[["all","Все форматы"],["ean_13","EAN-13"],["ean_8","EAN-8"],["upc_a","UPC-A"],["upc_e","UPC-E"],["data_matrix","DataMatrix"],["qr_code","QR Code"],["code_128","Code 128"],["code_39","Code 39"]].map(([v,l])=>html`<option key=${v} value=${v}>${l}</option>`)}
          </select>
          <div style=${{display:"flex",flexDirection:"column",gap:8}}>
            <button class="B BD" onClick=${()=>{setPg("articles");ldA()}}><${I} d=${ic.tag} s=${16}/> Таблица артикулов</button>
            <button class="B BD" onClick=${()=>setShowSearch(true)}><${I} d=${ic.search} s=${16}/> Поиск по артикулу</button>
            <button class="B BR" onClick=${reset}><${I} d=${ic.del} s=${16}/> Удалить все данные</button>
            <button class="B BO" onClick=${onLogout}><${I} d=${ic.logout} s=${16}/> Выйти</button>
          </div>
        `}

        ${isE&&html`
          <p style=${{color:"#666",fontSize:14,margin:"0 0 20px"}}>Артикул · Баркод · Склад · Ячейка · Время</p>
          <div style=${{display:"flex",flexDirection:"column",gap:10}}>
            <button class="B BG" style=${{padding:16,fontSize:16}} onClick=${doExpXLSX}><${I} d=${ic.dl} s=${18}/> Скачать XLSX</button>
            <button class="B BD" style=${{padding:16,fontSize:16}} onClick=${doExpCSV}><${I} d=${ic.dl} s=${18}/> Скачать CSV</button>
          </div>
        `}

        ${isA&&html`
          <p style=${{color:"#666",fontSize:14,margin:"0 0 14px"}}>CSV: <code style=${{color:"#00c96a",background:"#00c96a10",padding:"2px 6px",borderRadius:4}}>Баркод;Артикул</code></p>
          ${arts.length>0&&html`<div style=${{background:"#00c96a10",border:"1px solid #00c96a25",borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:14,color:"#00c96a"}}>Загружено: ${arts.length} артикулов</div>`}
          <div style=${{display:"flex",gap:8,marginBottom:12}}>
            <button class="B BO" style=${{flex:1}} onClick=${dlTpl}>Шаблон CSV</button>
            <input ref=${fRef} type="file" accept=".csv,.txt,.tsv" style=${{display:"none"}} onChange=${upArt}/>
            <button class="B BG" style=${{flex:1}} onClick=${()=>fRef.current?.click()}><${I} d=${ic.ul} s=${16}/> Загрузить</button>
          </div>
          <button class="B BD" style=${{width:"100%",marginBottom:14}} onClick=${()=>setShowSearch(true)}><${I} d=${ic.search} s=${16}/> Поиск по артикулу</button>
          ${arts.length>0&&html`<div>
            <div class="section-label" style=${{marginBottom:8}}>Загруженные</div>
            <div style=${{background:"#0d0d1a",border:"1px solid #1e1e38",borderRadius:12,maxHeight:300,overflowY:"auto"}}>
              ${arts.slice(0,100).map(a=>html`<div key=${a.barcode} style=${{padding:"10px 14px",borderBottom:"1px solid #151530",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style=${{fontWeight:600,color:"#ddd",fontSize:14}}>${a.article}</span><span style=${{fontFamily:"monospace",fontSize:11,color:"#484860"}}>${a.barcode}</span></div>`)}
            </div>
          </div>`}
        `}
      </div>

      <!-- BOTTOM BAR -->
      ${isC&&html`<div style=${{padding:"12px 16px",borderTop:"1px solid #1e1e38",background:"#10102a",display:"flex",gap:8,flexShrink:0}}>
        <button class="B BG" style=${{flex:1,padding:"15px 16px",fontSize:16}} onClick=${()=>setScn(true)}><${I} d=${ic.scan} s=${18}/> Сканировать</button>
        <button class="B BD" style=${{padding:"15px 18px"}} onClick=${()=>setMan(true)}><${I} d=${ic.kb} s=${18}/></button>
      </div>`}

      <!-- OVERLAYS -->
      ${scn&&html`<${Scanner} format=${fmt} onScan=${doScan} onClose=${()=>setScn(false)}/>`}
      ${man&&html`<${ManualInput} onScan=${doScan} onClose=${()=>setMan(false)}/>`}
      ${sht==="wh"&&html`<${InputSheet} title="Новый склад" placeholder="Название склада..." onSubmit=${addW} onClose=${()=>setSht(null)}/>`}
      ${sht==="cl"&&html`<${InputSheet} title="Новая ячейка" placeholder="Название ячейки..." onSubmit=${addC} onClose=${()=>setSht(null)}/>`}
      ${renSht&&html`<${RenameSheet} title=${renSht.type==="wh"?"Переименовать склад":"Переименовать ячейку"} currentName=${renSht.name} onSubmit=${n=>renSht.type==="wh"?renW(renSht.id,n):renC(renSht.id,n)} onClose=${()=>setRenSht(null)}/>`}
      ${showSearch&&html`<${SearchSheet} onClose=${()=>setShowSearch(false)}/>`}
      ${showCellImport&&html`<${CellImportSheet} whId=${wid} onClose=${()=>setShowCellImport(false)} onDone=${()=>ldC(wid)}/>`}
    </div>
  `;
}

/* ═══ ROOT ═══ */
function App(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    if(API._t){API.get("/me").then(r=>setUser(r.username)).catch(()=>API.clr()).finally(()=>setLoading(false))}
    else setLoading(false);
  },[]);
  const logout=()=>{API.clr();setUser(null)};
  if(loading)return html`<div style=${{position:"fixed",inset:0,background:"#0a0a16",display:"flex",alignItems:"center",justifyContent:"center"}}><div style=${{width:44,height:44,border:"3px solid #1e1e38",borderTopColor:"#00c96a",borderRadius:"50%",animation:"spin .7s linear infinite"}}/></div>`;
  if(!user)return html`<${Auth} onDone=${setUser}/>`;
  return html`<${Main} username=${user} onLogout=${logout}/>`;
}

render(html`<${App}/>`,document.getElementById("root"));
</script>
</body>
</html>
