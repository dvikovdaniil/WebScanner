/* ═══ KI Parser — Честный Знак DataMatrix ═══
   КИ содержит: 01+GTIN14(14ц)+21+серийный(13с)+крипто-хвост
   Первые 31 символ = идентификатор, далее крипто-подпись.
   Храним ПОЛНЫЙ КИ. GTIN14→EAN-13 для сопоставления с артикулами.
*/


function parseKI(raw){
  if(!raw) return null;

  const GS = "\x1D";

  let clean = raw
    .replace(/[\x00\x1e\x04]/g,"")
    .trim();

  // если GS нет — вставляем перед 91 и 92
  if(!clean.includes(GS)){
    clean = clean
      .replace(/21(.+?)91/, `21$1${GS}91`)
      .replace(/91(.+?)92/, `91$1${GS}92`);
  }

  const m = clean.match(/^01(\d{14})21(.+?)(?:\x1D|91)/);
  if(!m) return null;

  const gtin14 = m[1];
  const serial = m[2];

  const barcode = gtin14.startsWith("0")
    ? gtin14.substring(1)
    : gtin14;

  return {
    gtin: barcode,
    gtin14,
    serial,
    ki: clean
  };
}

  const[scanning,setScanning]=useState(false);
  const[result,setResult]=useState(null); // {ok,msg} or {err,msg}
  const ref=useRef(null);

  const doPickup=async(raw)=>{
    if(!raw?.trim())return;
    setResult(null);
    const ki=parseKI(raw.trim());
    const body={cellId:item.cell_id};
    if(ki){
      // Verify GTIN matches the item
      if(ki.gtin!==item.barcode){
        SoundMgr.error();
        setResult({err:true,msg:"GTIN не совпадает. Ожидается: "+item.barcode+", получен: "+ki.gtin});
        return;
      }
      body.ki=ki.ki;
    }else{
      // Regular barcode — verify match
      if(raw.trim()!==item.barcode){
        SoundMgr.error();
        setResult({err:true,msg:"Баркод не совпадает. Ожидается: "+item.barcode+", получен: "+raw.trim()});
        return;
      }
      body.barcode=raw.trim();
    }
    try{
      const r=await API.post("/pickup",body);
      SoundMgr.success();
      setResult({ok:true,msg:"Забрано: "+(ki?"КИ":"баркод")});
      if(onDone)onDone();
    }catch(e){

// Export LinenMark: update quantities in uploaded XLSX
async function doExpLinenMark(){
  try{
    const fileData=await API.get("/files/linenmark");
    const bqty=await API.get("/export/barcode-qty");
    if(!bqty.length){showToast("Нет сканов","warn");return}
    // Build qty map: barcode -> qty (add leading 0 for GTIN-14)
    const qtyMap={};
    bqty.forEach(r=>{
      qtyMap[r.barcode]=r.qty;
      // Also map with leading zero (GTIN-14 format)
      if(!r.barcode.startsWith("0"))qtyMap["0"+r.barcode]=r.qty;
    });
    const X=await import("https://cdn.sheetjs.com/xlsx-0.20.1/package/xlsx.mjs");
    const raw=Uint8Array.from(atob(fileData.data),c=>c.charCodeAt(0));
    const wb=X.read(raw,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const range=X.utils.decode_range(ws["!ref"]);
    // Col A = quantity (index 0), Col B = GTIN (index 1)
    for(let r=range.s.r+1;r<=range.e.r;r++){
      const gtinCell=ws[X.utils.encode_cell({r,c:1})];
      if(!gtinCell)continue;
      const gtin=String(gtinCell.v).trim();
      const qty = qtyMap[gtin];
      const qtyAddr = X.utils.encode_cell({r,c:0});

      if (qty === undefined) {
        delete ws[qtyAddr]; // ячейка будет пустая
      } else {
        ws[qtyAddr] = { t: "n", v: qty };
      }
    }
    X.writeFile(wb,"LinenMark_заказ.xlsx");
    showToast("LinenMark экспорт готов","ok");
  }catch(e){showToast("Ошибка: "+e.message,"err")}
}

  const ldI=async id=>{try{setIts(await API.get("/cells/"+id+"/items"))}catch{}};
  const ldA=async()=>{try{setArts(await API.get("/articles"))}catch{}};
  const ldF=async()=>{try{const s=await API.get("/settings");setFmt(s.barcode_format||"all");setSDelay(s.scan_delay||300);setSConf(s.scan_confirmations!=null?s.scan_confirmations:3)}catch{}};
  useEffect(()=>{ldW();ldF()},[]);

  const goH=()=>{setPg("home");setWid(null);setCid(null);ldW()};
  const goW=(id,nm)=>{setPg("wh");setWid(id);setWnm(nm);setCid(null);ldC(id)};
  const goC=(id,nm)=>{setPg("cell");setCid(id);setCnm(nm);ldI(id)};
  const goB=()=>pg==="cell"?goW(wid,wnm):goH();
  const addW=async n=>{await API.post("/warehouses",{name:n});setSht(null);ldW()};
  const delW=async(id,nm)=>{if(!confirm("Удалить «"+nm+"»?"))return;await API.del("/warehouses/"+id);ldW()};
  const renW=async(id,nn)=>{await API.put("/warehouses/"+id,{name:nn});setRenSht(null);if(wid===id)setWnm(nn);ldW()};
  const addC=async n=>{await API.post("/warehouses/"+wid+"/cells",{name:n});setSht(null);ldC(wid)};
  const delC=async(id,nm)=>{if(!confirm("Удалить «"+nm+"»?"))return;await API.del("/cells/"+id);ldC(wid)};
  const renC=async(id,nn)=>{await API.put("/cells/"+id,{name:nn});setRenSht(null);if(cid===id)setCnm(nn);ldC(wid)};

  const cidRef=useRef(cid);cidRef.current=cid;
  const doScan=useCallback(async(rawCode,format,manualArticle,manualKI)=>{
    const id=cidRef.current;if(!id)return;
    // Check if it's a KI — either explicit or auto-detected
    const parsed=parseKI(manualKI||rawCode);
    if(parsed){
      try{
        await API.post("/cells/"+id+"/scan",{barcode:parsed.gtin,ki:parsed.ki});
        SoundMgr.success();showToast("КИ: "+parsed.ki.substring(16,31),"ok");
      }catch(e){SoundMgr.error();showToast(e.message,"warn");try{navigator.vibrate([100,50,100])}catch(e2){}}
      ldI(id);return;
    }
    // Regular barcode
    SoundMgr.success();
    const body={barcode:rawCode};if(manualArticle)body.article=manualArticle;
    try{await API.post("/cells/"+id+"/scan",body)}catch(e){showToast(e.message,"err")}
    ldI(id);
  },[]);

  const delIt=async bc=>{await API.del("/cells/"+cid+"/items/"+encodeURIComponent(bc));ldI(cid)};
  const adjQ=async(bc,d)=>{await API.post("/cells/"+cid+"/items/"+encodeURIComponent(bc)+"/adjust",{delta:d});ldI(cid)};
  const upArt=async e=>{const f=e.target.files?.[0];if(!f)return;try{let t=await f.text();t=t.replace(/^\uFEFF/,"");const ls=t.split(/\r\n|\n|\r/).filter(l=>l.trim());if(!ls.length){showToast("Файл пуст","warn");e.target.value="";return}const items=[];const first=ls[0].split(/[;,\t]/)[0].trim();const isHeader=first&&/[а-яА-Яa-zA-Z]/.test(first);const start=isHeader?1:0;for(let i=start;i<ls.length;i++){const p=ls[i].split(/[;,\t]/);if(p.length>=2&&p[0].trim()&&p[1].trim())items.push({barcode:p[0].trim(),article:p[1].trim()})}if(items.length){await API.post("/articles/upload",{items});showToast(items.length+" загружено","ok")}else{showToast("Не найдено артикулов","warn")}ldA()}catch(er){showToast("Ошибка: "+er.message,"err")}e.target.value=""};
  const upLM=async e=>{const f=e.target.files?.[0];if(!f)return;const reader=new FileReader();reader.onload=async()=>{const b64=btoa(new Uint8Array(reader.result).reduce((d,b)=>d+String.fromCharCode(b),""));try{await API.post("/files/linenmark",{filename:f.name,data:b64});showToast("LinenMark загружен","ok")}catch(er){showToast(er.message,"err")}};reader.readAsArrayBuffer(f);e.target.value=""};
  const savS=async(f,d,c)=>{setFmt(f);setSDelay(d);setSConf(c);await API.put("/settings",{barcode_format:f,scan_delay:d,scan_confirmations:c})};
  const reset=async()=>{if(!confirm("Удалить ВСЕ?"))return;await API.del("/data");goH()};

  const isH=pg==="home",isW=pg==="wh",isC=pg==="cell",isS=pg==="settings",isE=pg==="export",isA=pg==="articles";
  const ttl=isH?"ScanStock":isW?wnm:isC?cnm:isS?"Настройки":isE?"Экспорт":"Артикулы";
  const sub=isH?username:isW?cls.length+" яч.":isC?wnm:null;
  const tS=whs.reduce((a,w)=>a+(w.scanCount||0),0);const tC=whs.reduce((a,w)=>a+(w.cellCount||0),0);
  const cQ=its.reduce((a,i)=>a+i.qty,0);const cKI=its.reduce((a,i)=>a+(i.kiCount||0),0);

  return html`<div style=${{position:"fixed",inset:0,display:"flex",flexDirection:"column",background:"#0a0a16",color:"#e0e0ee",overflow:"hidden"}}>
    <div style=${{background:"#10102a",borderBottom:"1px solid #1e1e38",padding:"12px 16px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      ${!isH&&html`<button class="icon-btn" onClick=${goB}><${I} d=${ic.back} s=${22}/></button>`}
      ${isH&&html`<div style=${{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#00c96a,#00a5ff)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><${I} d=${ic.scan} s=${17} c="#fff"/></div>`}
      <div style=${{flex:1,minWidth:0}}><div style=${{fontSize:17,fontWeight:700,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>${ttl}</div>${sub&&html`<div style=${{fontSize:11,color:"#555"}}>${sub}</div>`}</div>
      ${isC&&html`<span class="badge" style=${{background:"#00c96a18",color:"#00c96a"}}>${cQ}</span>${cKI>0&&html`<span class="ki-badge">КИ ${cKI}</span>`}`}
      ${isC&&html`<button class="icon-btn" onClick=${()=>{setHistoryCell(cid);setShowHistory(true)}}><${I} d=${ic.clock} s=${18}/></button>`}
      ${isH&&html`<button class="icon-btn" onClick=${()=>{setHistoryCell(null);setShowHistory(true)}}><${I} d=${ic.clock} s=${18}/></button><button class="icon-btn" onClick=${()=>setShowSearch(true)}><${I} d=${ic.search} s=${20}/></button><button class="icon-btn" onClick=${()=>{setPg("settings");ldF()}}><${I} d=${ic.gear} s=${20}/></button>`}
      ${(isW||isC)&&html`<button class="icon-btn" onClick=${()=>setRenSht(isW?{type:"wh",id:wid,name:wnm}:{type:"cl",id:cid,name:cnm})}><${I} d=${ic.edit} s=${18}/></button>`}
    </div>

    <div style=${{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:16}}>
      ${isH&&html`
        <div class="fade-in" style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:18}}>${[{l:"Склады",v:whs.length,c:"#00c96a"},{l:"Ячейки",v:tC,c:"#00a5ff"},{l:"Сканов",v:tS,c:"#9c6eff"}].map(s=>html`<div key=${s.l} class="card" style=${{padding:"16px 8px",textAlign:"center"}}><div style=${{fontSize:28,fontWeight:800,color:s.c,fontFamily:"monospace"}}>${s.v}</div><div style=${{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:".08em",marginTop:3}}>${s.l}</div></div>`)}</div>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:22}}>
          <button class="B BD" onClick=${()=>{setPg("articles");ldA()}}><${I} d=${ic.tag} s=${16}/> Артикулы</button>
          <button class="B BD" onClick=${()=>setPg("export")}><${I} d=${ic.dl} s=${16}/> Экспорт</button>
        </div>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><span class="section-label">Склады</span><button class="B BG" style=${{padding:"6px 14px",fontSize:13}} onClick=${()=>setSht("wh")}><${I} d=${ic.plus} s=${14}/> Добавить</button></div>
        ${whs.length===0?html`<div class="card" style=${{padding:"48px 24px",textAlign:"center"}}><div style=${{fontSize:42,marginBottom:10}}>📦</div><div style=${{color:"#444",fontSize:15}}>Создайте склад</div></div>`
        :whs.map((w,i)=>html`<div key=${w.id} class="card card-click fade-in" style=${{padding:"14px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12,animationDelay:i*40+"ms"}} onClick=${()=>goW(w.id,w.name)}><div style=${{width:44,height:44,borderRadius:11,background:"#00c96a10",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><${I} d=${ic.wh} s=${20} c="#00c96a"/></div><div style=${{flex:1,minWidth:0}}><div style=${{fontWeight:700,fontSize:16,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>${w.name}</div><div style=${{fontSize:12,color:"#555"}}>${w.cellCount||0} яч. · ${w.scanCount||0} сканов</div></div><button class="icon-btn" onClick=${e=>{e.stopPropagation();setRenSht({type:"wh",id:w.id,name:w.name})}}><${I} d=${ic.edit} s=${14}/></button><button class="icon-btn icon-btn-danger" onClick=${e=>{e.stopPropagation();delW(w.id,w.name)}}><${I} d=${ic.del} s=${16}/></button></div>`)}
      `}

      ${isW&&html`
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><span class="section-label">Ячейки</span><div style=${{display:"flex",gap:6}}><button class="B BD" style=${{padding:"6px 12px",fontSize:13}} onClick=${()=>setShowCI(true)}><${I} d=${ic.ul} s=${14}/> Импорт</button><button class="B BG" style=${{padding:"6px 14px",fontSize:13}} onClick=${()=>setSht("cl")}><${I} d=${ic.plus} s=${14}/> Добавить</button></div></div>
        ${cls.length===0?html`<div class="card" style=${{padding:"48px 24px",textAlign:"center"}}><div style=${{fontSize:42,marginBottom:10}}>📋</div><div style=${{color:"#444",fontSize:15}}>Создайте ячейку</div></div>`
        :cls.map((c,i)=>html`<div key=${c.id} class="card card-click fade-in" style=${{padding:"14px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12,animationDelay:i*40+"ms"}} onClick=${()=>goC(c.id,c.name)}><div style=${{width:44,height:44,borderRadius:11,background:"#00a5ff10",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><${I} d=${ic.cell} s=${20} c="#00a5ff"/></div><div style=${{flex:1,minWidth:0}}><div style=${{fontWeight:700,fontSize:16,color:"#fff"}}>${c.name}</div><div style=${{fontSize:12,color:"#555"}}>${c.itemCount||0} поз. · ${c.scanCount||0} шт.${c.kiCount>0?"":" "}</div>${c.kiCount>0&&html`<span class="ki-badge" style=${{marginTop:3}}>КИ ${c.kiCount}</span>`}</div><button class="icon-btn" onClick=${e=>{e.stopPropagation();setRenSht({type:"cl",id:c.id,name:c.name})}}><${I} d=${ic.edit} s=${14}/></button><button class="icon-btn icon-btn-danger" onClick=${e=>{e.stopPropagation();delC(c.id,c.name)}}><${I} d=${ic.del} s=${16}/></button></div>`)}
      `}

      ${isC&&html`
        ${its.length===0?html`<div class="card" style=${{padding:"48px 24px",textAlign:"center"}}><div style=${{fontSize:42,marginBottom:10}}>📷</div><div style=${{color:"#444",fontSize:15}}>Сканируйте</div></div>`
        :its.map((it,i)=>html`<div key=${it.barcode||it.article} class="card fade-in" style=${{padding:"12px 14px",marginBottom:8,animationDelay:i*30+"ms"}}><div style=${{display:"flex",alignItems:"center",gap:10}}><div style=${{flex:1,minWidth:0}}><div style=${{fontWeight:700,fontSize:15,color:"#e8e8f0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>${it.article||"—"}</div><div style=${{fontFamily:"monospace",fontSize:11,color:"#484860",marginTop:1}}>${it.barcode||"(без баркода)"}</div></div><div style=${{display:"flex",alignItems:"center",gap:4,flexShrink:0}}><button class="qty-btn" onClick=${()=>adjQ(it.barcode,-1)}>−</button><span style=${{minWidth:36,textAlign:"center",fontWeight:800,fontSize:18,fontFamily:"monospace",color:"#fff"}}>${it.qty}</span><button class="qty-btn" onClick=${()=>adjQ(it.barcode,1)}>+</button></div><button class="icon-btn icon-btn-danger" onClick=${()=>delIt(it.barcode)}><${I} d=${ic.del} s=${16}/></button></div>${it.kiCount>0&&html`<div style=${{marginTop:6,display:"flex",alignItems:"center",gap:6}}><span class="ki-badge">КИ ${it.kiCount}</span><span style=${{fontSize:11,color:"#666"}}>из ${it.qty}</span></div>`}</div>`)}
      `}

      ${isS&&html`
        <div class="card fade-in" style=${{padding:16,marginBottom:16,display:"flex",alignItems:"center",gap:12}}><div style=${{width:44,height:44,borderRadius:"50%",background:"#00c96a10",display:"flex",alignItems:"center",justifyContent:"center"}}><${I} d=${ic.user} s=${20} c="#00c96a"/></div><div><div style=${{fontWeight:700,color:"#fff",fontSize:16}}>${username}</div><div style=${{fontSize:12,color:"#555"}}>Авторизация</div></div></div>
        <label style=${{fontSize:13,color:"#777",display:"block",marginBottom:6}}>Формат</label>
        <select value=${fmt} onChange=${e=>savS(e.target.value,sDelay,sConf)} style=${{marginBottom:16}}>${[["all","Все"],["ean_13","EAN-13"],["ean_8","EAN-8"],["upc_a","UPC-A"],["upc_e","UPC-E"],["data_matrix","DataMatrix"],["qr_code","QR"],["code_128","Code 128"],["code_39","Code 39"]].map(([v,l])=>html`<option key=${v} value=${v}>${l}</option>`)}</select>
        <label style=${{fontSize:13,color:"#777",display:"block",marginBottom:6}}>Задержка: <b style=${{color:"#fff"}}>${sDelay}мс</b></label>
        <input type="range" min="100" max="800" step="50" value=${sDelay} onInput=${e=>setSDelay(+e.target.value)} onChange=${e=>savS(fmt,+e.target.value,sConf)} style=${{marginBottom:16}}/>
        <label style=${{fontSize:13,color:"#777",display:"block",marginBottom:8}}>Подтверждения</label>
        <div style=${{display:"flex",gap:6,marginBottom:20}}>${[{v:0,l:"Без"},{v:2,l:"×2"},{v:3,l:"×3"}].map(o=>html`<button key=${o.v} onClick=${()=>{setSConf(o.v);savS(fmt,sDelay,o.v)}} class="B" style=${{flex:1,padding:"10px 6px",fontSize:13,background:sConf===o.v?"#00c96a22":"#1a1a30",color:sConf===o.v?"#00c96a":"#888",border:sConf===o.v?"1.5px solid #00c96a44":"1.5px solid #252540"}}>${o.l}</button>`)}</div>
        <div style=${{display:"flex",flexDirection:"column",gap:8}}>
          <button class="B BD" onClick=${()=>{setPg("articles");ldA()}}><${I} d=${ic.tag} s=${16}/> Артикулы</button>
          <button class="B BD" onClick=${()=>setShowSearch(true)}><${I} d=${ic.search} s=${16}/> Поиск</button>
          <button class="B BD" onClick=${()=>setShowBackups(true)}><${I} d=${ic.save} s=${16}/> Бэкапы</button>
          <button class="B BR" onClick=${reset}><${I} d=${ic.del} s=${16}/> Удалить всё</button>
          <button class="B BO" onClick=${onLogout}><${I} d=${ic.logout} s=${16}/> Выйти</button>
        </div>
      `}

      ${isE&&html`
        <div class="section-label" style=${{marginBottom:12}}>Общий экспорт</div>
        <div style=${{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
          <button class="B BG" style=${{padding:14}} onClick=${doExpXLSX}><${I} d=${ic.dl} s=${18}/> XLSX (всё)</button>
          <button class="B BD" style=${{padding:14}} onClick=${doExpCSV}><${I} d=${ic.dl} s=${18}/> CSV (всё)</button>
        </div>
        <div class="section-label" style=${{marginBottom:12}}>Экспорт КИ</div>
        <div style=${{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
          <button class="B BY" style=${{padding:14}} onClick=${doExpKIs}><${I} d=${ic.dl} s=${18}/> CSV только КИ</button>
        </div>
        <div class="section-label" style=${{marginBottom:12}}>Заказ в LinenMark</div>
        <p style=${{color:"#666",fontSize:12,margin:"0 0 8px"}}>Загрузите шаблон XLSX, количества обновятся по GTIN</p>
        <input ref=${lmRef} type="file" accept=".xlsx" style=${{display:"none"}} onChange=${upLM}/>
        <div style=${{display:"flex",flexDirection:"column",gap:8}}>
          <button class="B BD" style=${{padding:14}} onClick=${()=>lmRef.current?.click()}><${I} d=${ic.ul} s=${16}/> Загрузить шаблон XLSX</button>
          <button class="B BG" style=${{padding:14}} onClick=${doExpLinenMark}><${I} d=${ic.dl} s=${18}/> Скачать заказ LinenMark</button>
        </div>
      `}

      ${isA&&html`
        <p style=${{color:"#666",fontSize:14,margin:"0 0 14px"}}>CSV: <code style=${{color:"#00c96a",background:"#00c96a10",padding:"2px 6px",borderRadius:4}}>Баркод;Артикул</code></p>
        ${arts.length>0&&html`<div style=${{background:"#00c96a10",border:"1px solid #00c96a25",borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:14,color:"#00c96a"}}>${arts.length} артикулов</div>`}
        <div style=${{display:"flex",gap:8,marginBottom:12}}><button class="B BO" style=${{flex:1}} onClick=${dlTpl}>Шаблон</button><input ref=${fRef} type="file" accept=".csv,.txt,.tsv" style=${{display:"none"}} onChange=${upArt}/><button class="B BG" style=${{flex:1}} onClick=${()=>fRef.current?.click()}>Загрузить</button></div>
        <button class="B BD" style=${{width:"100%",marginBottom:14}} onClick=${()=>setShowSearch(true)}><${I} d=${ic.search} s=${16}/> Поиск</button>
        ${arts.length>0&&html`<div style=${{background:"#0d0d1a",border:"1px solid #1e1e38",borderRadius:12,maxHeight:300,overflowY:"auto"}}>${arts.slice(0,100).map(a=>html`<div key=${a.barcode} style=${{padding:"10px 14px",borderBottom:"1px solid #151530",display:"flex",justifyContent:"space-between"}}><span style=${{fontWeight:600,color:"#ddd",fontSize:14}}>${a.article}</span><span style=${{fontFamily:"monospace",fontSize:11,color:"#484860"}}>${a.barcode}</span></div>`)}</div>`}
      `}
    </div>

    ${isC&&html`<div style=${{padding:"12px 16px",borderTop:"1px solid #1e1e38",background:"#10102a",display:"flex",gap:8,flexShrink:0}}><button class="B BG" style=${{flex:1,padding:"15px 16px",fontSize:16}} onClick=${()=>setScn(true)}><${I} d=${ic.scan} s=${18}/> Сканировать</button><button class="B BD" style=${{padding:"15px 18px"}} onClick=${()=>setMan(true)}><${I} d=${ic.kb} s=${18}/></button></div>`}

    ${scn&&html`<${Scanner} format=${fmt} scanDelay=${sDelay} scanConfirmations=${sConf} onScan=${doScan} onClose=${()=>setScn(false)}/>`}
    ${man&&html`<${ManualInput} onScan=${doScan} onClose=${()=>setMan(false)}/>`}
    ${sht==="wh"&&html`<${InputSheet} title="Новый склад" placeholder="Название..." onSubmit=${addW} onClose=${()=>setSht(null)}/>`}
    ${sht==="cl"&&html`<${InputSheet} title="Новая ячейка" placeholder="Название..." onSubmit=${addC} onClose=${()=>setSht(null)}/>`}
    ${renSht&&html`<${RenameSheet} title=${renSht.type==="wh"?"Переименовать склад":"Переименовать ячейку"} currentName=${renSht.name} onSubmit=${n=>renSht.type==="wh"?renW(renSht.id,n):renC(renSht.id,n)} onClose=${()=>setRenSht(null)}/>`}
    ${showSearch&&html`<${SearchSheet} onClose=${()=>setShowSearch(false)} warehouses=${whs} onPickup=${item=>{setPickupItem(item)}}/>`}
    ${pickupItem&&html`<${PickupSheet} item=${pickupItem} format=${fmt} scanDelay=${sDelay} scanConfirmations=${sConf} onClose=${()=>{setPickupItem(null);ldW();if(cid)ldI(cid)}} onDone=${()=>{ldW();if(cid)ldI(cid)}}/>`}
    ${showCI&&html`<${CellImportSheet} whId=${wid} onClose=${()=>setShowCI(false)} onDone=${()=>ldC(wid)}/>`}
    ${showHistory&&html`<${HistorySheet} cellId=${historyCell} onClose=${()=>setShowHistory(false)} onRefresh=${()=>{if(cid)ldI(cid);ldW()}}/>`}
    ${showBackups&&html`<${BackupSheet} onClose=${()=>{setShowBackups(false);ldW()}}/>`}
  </div>`;
}

function App(){const[u,setU]=useState(null);const[ld,setLd]=useState(true);useEffect(()=>{if(API._t)API.get("/me").then(r=>setU(r.username)).catch(()=>API.clr()).finally(()=>setLd(false));else setLd(false)},[]);const lo=()=>{API.clr();setU(null)};if(ld)return html`<div style=${{position:"fixed",inset:0,background:"#0a0a16",display:"flex",alignItems:"center",justifyContent:"center"}}><div style=${{width:44,height:44,border:"3px solid #1e1e38",borderTopColor:"#00c96a",borderRadius:"50%",animation:"spin .7s linear infinite"}}/></div>`;if(!u)return html`<${Auth} onDone=${setU}/>`;return html`<${Main} username=${u} onLogout=${lo}/>`}
render(html`<${App}/>`,document.getElementById("root"));
</script>
</body>
</html>
